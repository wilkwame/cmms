<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <link rel="stylesheet" href="style/workorders.css?v=8">
</head>
<body>
  <page name="workorders" id="workorders" onshow="loadWorkOrdersPage">
  <section>
    <div class="filter-bar">
      <div class="filter-group">
        <label>Status</label>
        <select id="wo-filter-status">
          <option value="all">All</option>
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="overdue">Overdue</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Priority</label>
        <select id="wo-filter-priority">
          <option value="all">All</option>
          <option value="urgent">Urgent</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Category</label>
        <select id="wo-filter-category">
          <option value="all">All</option>
          <option value="Electrical">Electrical</option>
          <option value="Plumbing">Plumbing</option>
          <option value="Carpentry">Carpentry</option>
          <option value="Roofing">Roofing</option>
          <option value="HVAC">HVAC</option>
          <option value="Civil">Civil</option>
          <option value="General">General</option>
        </select>
      </div>
      <div class="filter-group search-group">
        <input type="text" id="wo-search" placeholder="Search..." />
      </div>
      <button class="btn-new-workorder" action="goToNewWorkOrder">+ New</button>
    </div>

    <div class="table-container">
      <div class="table-header">
        <h4>All Work Orders</h4>
        <span class="record-count" id="wo-count">0 records</span>
      </div>
      <div class="table-wrapper">
        <div class="table-head">
          <span class="col-id">ID</span>
          <span class="col-issue">Issue</span>
          <span class="col-worker">Assigned To</span>
          <span class="col-category">Category</span>
          <span class="col-location">Location</span>
          <span class="col-priority">Priority</span>
          <span class="col-status">Status</span>
          <span class="col-date">Due Date</span>
          <span class="col-action">Action</span>
        </div>
        <div id="workorders-body">
          <p class="loading-text">Loading work orders...</p>
        </div>
      </div>
      <div class="pagination-bar">
        <button id="workorders-prev" class="pagination-btn" action="workOrdersPrev" disabled>← Prev</button>
        <span id="workorders-page-label" class="pagination-label">Page 1 of 1</span>
        <button id="workorders-next" class="pagination-btn" action="workOrdersNext">Next →</button>
      </div>
    </div>
  </section>
</page>
</body>
</html>
