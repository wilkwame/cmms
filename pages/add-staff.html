<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style/add-staff.css?v=10">
</head>
<body>
 <page name="add-staff" id="add-staff" onshow="loadAddStaffPage">
  <section>
    <div class="form-container">
      <div class="form-header">
        <div class="header-left">
          <button class="back-btn" action="goToStaff"><i class="fas fa-arrow-left"></i> Back</button>
          <h2><i class="fas fa-user-plus"></i> Add New Staff</h2>
        </div>
      </div>

      <form class="staff-form" id="staff-form" action="submitNewStaff">
        <div class="form-section">
          <h3><i class="fas fa-user"></i> Personal Information</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Full Name <span class="required">*</span></label>
              <input type="text" name="name" placeholder="Enter full name" required />
            </div>
            <div class="form-group">
              <label>Email <span class="required">*</span></label>
              <input type="email" name="email" placeholder="Enter email address" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Password <span class="required">*</span></label>
              <input type="password" name="password" placeholder="Min 6 characters" required />
            </div>
            <div class="form-group">
              <label>Confirm Password <span class="required">*</span></label>
              <input type="password" name="confirm_password" placeholder="Confirm password" required />
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3><i class="fas fa-briefcase"></i> Staff Details</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Role <span class="required">*</span></label>
              <select name="role" required>
                <option value="">Select Role</option>
                <option value="supervisor">Supervisor</option>
                <option value="technician">Technician</option>
              </select>
              <p class="field-hint">This form is for adding workers only — everyone else signs in as a reporter via Google.</p>
            </div>
            <div class="form-group">
              <label>Department <span class="required">*</span></label>
              <select name="department" required>
                <option value="">Select Department</option>
                <option value="Electrical">Electrical</option>
                <option value="Plumbing">Plumbing</option>
                <option value="Carpentry">Carpentry</option>
                <option value="Roofing">Roofing</option>
                <option value="HVAC">HVAC</option>
                <option value="Civil">Civil</option>
                <option value="General">General</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full-width">
              <label>Skills <span class="required">*</span></label>
              <div class="skills-grid" id="staff-skills">
                <label class="skill-chip"><input type="checkbox" name="skills" value="1" /> Electrical</label>
                <label class="skill-chip"><input type="checkbox" name="skills" value="2" /> Plumbing</label>
                <label class="skill-chip"><input type="checkbox" name="skills" value="3" /> Carpentry</label>
                <label class="skill-chip"><input type="checkbox" name="skills" value="4" /> Roofing</label>
                <label class="skill-chip"><input type="checkbox" name="skills" value="5" /> HVAC</label>
                <label class="skill-chip"><input type="checkbox" name="skills" value="6" /> Civil</label>
                <label class="skill-chip"><input type="checkbox" name="skills" value="7" /> General</label>
              </div>
              <p class="field-hint">Click to select any number of skills — this is what auto-assignment matches on.</p>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Joined Date</label>
              <input type="date" name="joined_at" id="joined-date" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Status</label>
              <select name="is_active">
                <option value="1">Active</option>
                <option value="0">Inactive</option>
              </select>
            </div>
          </div>
        </div>

        <p id="form-status" class="form-status">All fields marked with * are required</p>

        <div class="form-actions">
          <button type="button" class="btn-cancel" action="goToStaff"><i class="fas fa-times"></i> Cancel</button>
          <button type="submit" class="btn-submit" id="submit-btn"><i class="fas fa-save"></i> Add Staff</button>
        </div>
      </form>
    </div>
  </section>
</page>
</body>
</html>
